name: Security Scan (Bandit)

on:
  push:
    branches: [ "main", "master" ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Bandit
      run: pip install bandit

    - name: Run Bandit Scan
      run: bandit -r . -ll


